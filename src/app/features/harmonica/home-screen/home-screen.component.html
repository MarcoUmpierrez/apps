<div class="fixed inset-0 flex flex-col items-center justify-center z-50 p-8 bg-(--bg-main)">
  <h1 class="text-5xl font-black mb-10 italic tracking-tighter text-emerald-500 text-center uppercase">
    Harmonica Hero
  </h1>

  <div class="space-y-4 w-full flex flex-col items-center">
    <div
      class="w-full max-w-100 cursor-pointer rounded-3xl border border-(--border-ui) bg-(--bg-card) p-6 backdrop-blur-md transition-all duration-200 ease-in-out hover:-translate-y-0.5 hover:border-(--color-blow) flex items-center justify-between"
      (click)="startFreePlay.emit()">
      <div>
        <h3 class="text-xl font-bold">Free practice</h3>
        <p class="text-sm opacity-60">Infinite mode to improve</p>
      </div>
      <span class="text-2xl">♾️</span>
    </div>

    <div
      class="w-full max-w-100 cursor-pointer rounded-3xl border border-(--border-ui) bg-(--bg-card) p-6 backdrop-blur-md transition-all duration-200 ease-in-out hover:-translate-y-0.5 hover:border-(--color-blow) flex items-center justify-between"
      (click)="showSongs.emit()">
      <div>
        <h3 class="text-xl font-bold">Songs</h3>
        <p class="text-sm opacity-60">Select a musical theme</p>
      </div>
      <span class="text-2xl">🎵</span>
    </div>

    <div
      class="w-full max-w-100 cursor-pointer rounded-3xl border border-(--border-ui) bg-(--bg-card) p-6 backdrop-blur-md transition-all duration-200 ease-in-out hover:-translate-y-0.5 hover:border-(--color-blow) flex items-center justify-between"
      (click)="showOptions.emit()">
      <div>
        <h3 class="text-xl font-bold">Options</h3>
        <p class="text-sm opacity-60">Key and settings</p>
      </div>
      <span class="text-2xl">⚙️</span>
    </div>
  </div>
</div>
