<div class="fixed inset-0 z-100 flex items-center justify-center bg-black/80 backdrop-blur-sm">
  <div class="w-full max-w-100 cursor-pointer rounded-3xl border border-(--border-ui)
            bg-(--bg-card) p-6 backdrop-blur-md transition-all duration-200 ease-in-out
            hover:-translate-y-0.5 hover:border-(--color-blow) text-center space-y-6">

    <h2 class="text-4xl font-black italic text-emerald-500 uppercase">RESULT!</h2>

    <div class="py-4 border-y border-white/10">
      <p class="text-xs uppercase font-bold tracking-widest opacity-50 mb-1">Final Score</p>
      <p class="text-5xl font-mono font-black">{{ formattedScore }}</p>
    </div>

    <div class="flex gap-4">
      <button
        class="flex-1 py-4 bg-emerald-600 rounded-xl font-bold hover:bg-emerald-500 transition-colors"
        (click)="restart.emit()"
      >
        RETRY
      </button>
      <button
        class="flex-1 py-4 bg-slate-700 rounded-xl font-bold hover:bg-slate-600 transition-colors"
        (click)="exit.emit()"
      >
        MENU
      </button>
    </div>

  </div>
</div>
