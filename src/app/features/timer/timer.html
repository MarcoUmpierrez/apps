<div class="min-h-screen text-slate-100 flex items-center justify-center p-6 selection:bg-indigo-500/30 bg-[#050505] font-sans">
  <div class="w-full max-w-[400px] aspect-[9/16] bg-[#0f1115] rounded-[3rem] shadow-2xl border border-white/5 flex flex-col overflow-hidden relative">

    <a routerLink="dashboard"
       class="absolute top-8 left-8 z-20 flex items-center gap-2 group transition-all"
       aria-label="Return to Dashboard">
      <div class="w-8 h-8 rounded-full bg-white/5 border border-white/10 flex items-center justify-center group-hover:bg-indigo-500/20 group-hover:border-indigo-500/40 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400 group-hover:text-indigo-400">
          <path d="m15 18-6-6 6-6"/>
        </svg>
      </div>
    </a>

    <div class="absolute -top-24 -left-24 w-64 h-64 blur-[100px] rounded-full opacity-20 transition-all duration-1000" [class]="themeClass()"></div>

    <div class="pt-12 px-8 flex justify-end items-center z-10">
      <div class="text-[10px] font-bold tracking-[0.2em] text-slate-500 uppercase">Stretch.Flow</div>
      @if (isRunning()) {
        <div class="ml-2 w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
      }
    </div>

    <div class="flex-1 flex flex-col items-center justify-center px-8 z-10">
      <div class="relative w-full aspect-square flex items-center justify-center">
        <svg class="w-full h-full -rotate-90 transform">
          <circle cx="50%" cy="50%" r="45%" class="stroke-slate-800 fill-none" stroke-width="4" />
          <circle
            cx="50%" cy="50%" r="45%"
            class="fill-none transition-[stroke-dashoffset] duration-1000 ease-linear"
            [style.stroke]="isResting() ? 'rgb(52, 211, 153)' : 'rgb(129, 140, 248)'"
            stroke-width="8"
            stroke-linecap="round"
            stroke-dasharray="282.74%"
            [style.strokeDashoffset]="progressOffset()"
          />
        </svg>

        <div class="absolute inset-0 flex flex-col items-center justify-center">
          <span class="text-xs font-bold tracking-[0.3em] text-slate-500 uppercase mb-2">
            {{ phaseLabel() }}
          </span>
          <h2 class="text-7xl font-bold tracking-tighter tabular-nums leading-none">
            {{ displayTime() }}
          </h2>
          <div
            class="mt-4 flex items-center gap-2 transition-opacity duration-300"
            [style.opacity]="isRunning() ? '1' : '0'">
             <span class="w-2 h-2 rounded-full transition-colors" [class]="isResting() ? 'bg-emerald-400' : 'bg-indigo-400'"></span>
             <span class="text-sm font-medium text-slate-400 italic">Cycle {{ cycleCount() }}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="p-8 pb-12 bg-white/[0.02] backdrop-blur-xl border-t border-white/5 z-10">

      @if (!isRunning()) {
        <div class="grid grid-cols-2 gap-4 mb-8">
          <div class="flex flex-col gap-2">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest pl-1">Work (s)</label>
            <input
              type="number"
              [value]="workSeconds()"
              (input)="workSeconds.set($any($event.target).value)"
              class="bg-white/5 border border-white/10 rounded-2xl py-4 px-4 text-center text-xl font-bold focus:border-indigo-500/50 outline-none transition-colors"
            />
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest pl-1">Rest (s)</label>
            <input
              type="number"
              [value]="restSeconds()"
              (input)="restSeconds.set($any($event.target).value)"
              class="bg-white/5 border border-white/10 rounded-2xl py-4 px-4 text-center text-xl font-bold focus:border-emerald-500/50 outline-none transition-colors"
            />
          </div>
        </div>

        <button
          (click)="startTimer()"
          class="w-full py-5 bg-indigo-500 hover:bg-indigo-400 text-white rounded-[2rem] font-black text-lg shadow-[0_0_30px_rgba(99,102,241,0.3)] transition-all active:scale-95 flex items-center justify-center gap-3"
        >
          START SESSION
        </button>
      } @else {
        <button
          (click)="stopTimer()"
          class="w-full py-5 border border-white/10 hover:bg-white/5 text-slate-400 rounded-[2rem] font-bold text-lg transition-all active:scale-95"
        >
          STOP & RESET
        </button>
      }
    </div>
  </div>
</div>
