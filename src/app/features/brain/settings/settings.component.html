<div class="min-h-screen flex flex-col items-center p-4 bg-[#0f172a]">
      <div class="w-full max-w-md bg-slate-800 rounded-3xl shadow-xl p-6 mt-8 border border-slate-700">

        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-bold text-slate-100">Timer Settings</h2>
          <button
            (click)="close()"
            type="button"
            class="text-slate-500 hover:text-slate-300 font-bold text-lg transition-colors"
            aria-label="Close settings">
            ✕
          </button>
        </div>

        <p class="text-sm text-slate-400 mb-6">
          Adjust the seconds available for each game mode:
        </p>

        <div class="space-y-6">
          @for (item of menuItems; track item.mode) {
            <div class="flex flex-col space-y-2">
              <div class="flex justify-between items-center">
                <span class="font-bold text-slate-200">{{ item.label }}</span>
                <span class="text-blue-400 font-mono font-bold">
                  {{ store.timerFor(item.mode) }}s
                </span>
              </div>
              <input
                type="range"
                min="2"
                max="60"
                [value]="store.timerFor(item.mode)"
                (input)="onSlider(item.mode, $event)"
                class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500" />
              <div class="flex justify-between text-[10px] text-slate-500">
                <span>2s</span>
                <span>60s</span>
              </div>
            </div>
          }
        </div>

        <button
          (click)="resetDefaults()"
          type="button"
          class="w-full mt-6 py-3 text-sm text-slate-400 font-semibold rounded-2xl
                 border border-slate-700 hover:bg-slate-700/50 transition-colors">
          Reset to Defaults
        </button>

        <button
          (click)="close()"
          type="button"
          class="w-full mt-3 bg-blue-600 text-white font-bold py-4 rounded-2xl
                 shadow-lg shadow-blue-900/20 hover:bg-blue-500 active:scale-95 transition-all">
          Save & Close
        </button>

      </div>
    </div>
