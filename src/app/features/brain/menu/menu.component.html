<div class="min-h-screen flex flex-col items-center p-4 bg-[#0f172a]">

      <header class="w-full max-w-md flex justify-between items-center mb-6 mt-4">
        <a routerLink="dashboard" class="top-8 left-8 z-20 flex items-center gap-2 group transition-all"
      aria-label="Return to Dashboard">
         <div class="rounded-2xl bg-slate-800 p-3 shadow-sm border border-slate-700">
           <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-slate-500 group-hover:text-indigo-400">
             <path d="m15 18-6-6 6-6"/>
           </svg>
         </div>
       </a>
        <div>
          <h1 class="text-2xl font-bold text-slate-100">Brain Trainer</h1>
          <p class="text-sm text-slate-400">Infinite Streak Mode</p>
        </div>
        <a
          routerLink="/brain/settings"
          class="bg-slate-800 p-3 rounded-2xl shadow-sm border border-slate-700
                 text-slate-400 hover:text-blue-400 transition-colors"
          aria-label="Settings">
          ⚙️
        </a>
      </header>

      <div class="w-full max-w-md bg-slate-800 p-3 mb-4 rounded-2xl shadow-sm
                  border border-slate-700 text-center">
        <div class="text-[10px] uppercase tracking-wider text-slate-500 font-bold">
          Total Points Accumulated
        </div>
        <div class="text-xl font-bold text-blue-400">{{ store.globalScore() }}</div>
      </div>

      <main class="w-full max-w-md space-y-3 pb-8">
        @for (item of menuItems; track item.mode) {
          <button
            (click)="startGame(item.mode)"
            type="button"
            class="w-full bg-slate-800 p-4 rounded-3xl shadow-sm border-b-4 flex items-center
                   space-x-4 transition-all active:scale-[0.98] border-slate-700"
            [class]="item.borderColor + ' ' + item.bgHover">
            <div class="p-3 rounded-2xl text-xl" [class]="item.iconBg">
              {{ item.emoji }}
            </div>
            <div class="text-left">
              <h2 class="font-bold text-slate-100">{{ item.label }}</h2>
              <p class="text-xs text-slate-400">
                {{ store.timerFor(item.mode) }}s per problem.
              </p>
            </div>
          </button>
        }
      </main>
    </div>
