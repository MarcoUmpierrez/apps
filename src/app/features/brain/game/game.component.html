<div class="w-full min-h-screen flex flex-col items-center p-4 bg-[#0f172a]">
      <div
        class="w-full max-w-md bg-slate-800 rounded-3xl shadow-xl overflow-hidden flex flex-col min-h-130 border border-slate-700"
        [class.shake]="isShaking()">

        <div class="bg-slate-800/50 border-b border-slate-700 flex flex-col">
          <div class="p-4 flex justify-between items-center">
            <button
              (click)="exitToMenu()"
              type="button"
              class="text-slate-500 hover:text-slate-300 font-bold text-sm transition-colors">
              ✕ Exit
            </button>
            <div class="font-bold text-blue-400">Streak: {{ streak() }}</div>
            <div class="text-[10px] font-bold uppercase tracking-widest text-slate-500">
              {{ gameTitle() }}
            </div>
          </div>
          <app-timer-bar [timeLeft]="timeLeft()" [maxTime]="maxTime()" />
        </div>

        @switch (mode()) {
          @case ('math') {
            <app-math-game
              [mode]="'math'"
              [active]="gameActive()"
              (correct)="onCorrect()"
              (wrong)="onWrong()" />
          }
          @case ('multiply') {
            <app-math-game
              [mode]="'multiply'"
              [active]="gameActive()"
              (correct)="onCorrect()"
              (wrong)="onWrong()" />
          }
          @case ('divide') {
            <app-math-game
              [mode]="'divide'"
              [active]="gameActive()"
              (correct)="onCorrect()"
              (wrong)="onWrong()" />
          }
          @case ('memory') {
            <app-memory-game
              #memoryGame
              [active]="gameActive()"
              [memoryLevel]="memoryLevel()"
              (correct)="onMemoryCorrect()"
              (wrong)="onMemoryWrong()" />
          }
          @case ('pairs') {
            <app-pairs-game
              [active]="gameActive()"
              (correct)="onCorrect()"
              (wrong)="onWrong()" />
          }
        }
      </div>
    </div>

    <app-feedback [visible]="showFeedback()" [correct]="feedbackCorrect()" />

    <app-result-overlay
      [visible]="showResult()"
      [score]="streak()"
      (tryAgain)="tryAgain()"
      (goMenu)="exitToMenu()" />
