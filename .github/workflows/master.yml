name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
  environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx ng build --base-href /apps/

      - name: Fix for GitHub Pages
        run: cp dist/apps/browser/index.html dist/apps/browser/404.html

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/apps/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4